name: CI

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'
      - 'test/**'
      - 'docs/**'
      - 'refactor/**'
      - 'ci/**'
      - 'migration/**'
      - 'perf/**'
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    uses: ./.github/workflows/lint.yml

  test:
    name: Test
    uses: ./.github/workflows/test.yml

  build:
    name: Build
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    uses: ./.github/workflows/build.yml

  smoke-binary:
    name: Smoke (binary)
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    uses: ./.github/workflows/smoke-binary.yml
