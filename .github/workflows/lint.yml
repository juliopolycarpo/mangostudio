name: Lint

on:
  workflow_call:

jobs:
  check:
    name: Check (lint + format + typecheck)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run check
        run: bun run check
